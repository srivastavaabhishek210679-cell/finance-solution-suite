<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Essential Mobile Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />
    
    <!-- Progressive Web App Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finance Suite" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#0a1628" />
    <meta name="msapplication-navbutton-color" content="#0a1628" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#0a1628" />
    
    <!-- App Information -->
    <meta name="application-name" content="Finance Solution Suite" />
    <meta name="description" content="Enterprise Financial Reporting & Compliance Platform - 500+ Pre-built Reports across 13 Business Domains" />
    <meta name="keywords" content="finance, compliance, reporting, analytics, enterprise, dashboard" />
    <meta name="author" content="Finance Solution Suite" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Finance Solution Suite - Enterprise Dashboard" />
    <meta property="og:description" content="Comprehensive financial reporting and compliance tracking platform" />
    <meta property="og:site_name" content="Finance Solution Suite" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Finance Solution Suite" />
    <meta name="twitter:description" content="Enterprise Financial Reporting & Compliance Platform" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Page Title -->
    <title>Finance Solution Suite - Enterprise Dashboard</title>
    
    <!-- Prevent Zoom on Input Focus (iOS) -->
    <style>
      @media screen and (-webkit-min-device-pixel-ratio: 0) {
        select,
        textarea,
        input {
          font-size: 16px !important;
        }
      }
    </style>

        justify-content: center;

        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 2rem;
      ">
        <div>
          <h1 style="font-size: 2rem; margin-bottom: 1rem;">JavaScript Required</h1>
          <p style="color: #64748b; font-size: 1.125rem;">

          </p>
        </div>
      </div>
