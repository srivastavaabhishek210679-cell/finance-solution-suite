services:
  - type: web
    name: finance-frontend
    env: static
    buildCommand: npm install && chmod +x node_modules/.bin/* && npx vite build
    staticPublishPath: ./dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
